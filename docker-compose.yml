services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-readyops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-readyops}
      POSTGRES_DB: ${POSTGRES_DB:-readyops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-readyops} -d $${POSTGRES_DB:-readyops}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
